# ~/.config/tmux/tmux.conf
source-file ~/.config/tmux/tmux.conf

##### Terminal / True color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

##### Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Geral
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g set-clipboard on
setw -g mode-keys vi
set -g status-position bottom
set -g pane-border-lines single

##### Reload
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf recarregado"

##### Janelas
bind C-c new-window -c "#{pane_current_path}"
bind N command-prompt -p "New Session:" "new-session -A -s '%%'"
bind r command-prompt -p "Rename window:" "rename-window '%%'"
bind H previous-window
bind L next-window
bind C-a last-window
bind w list-windows

##### Panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind s choose-session
bind z resize-pane -Z
bind x swap-pane -D

bind -r , resize-pane -L 20
bind -r . resize-pane -R 20
bind -r = resize-pane -U 7
bind -r _ resize-pane -D 7

##### Home / End
bind -n Home send-key C-a
bind -n End send-key C-e

##### Navegação Vim/Neovim-aware
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

bind -n C-Space if-shell "$is_vim" "send-keys C-Space" "select-pane -t:.+"

##### Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-Space select-pane -t:.+

# Omarchy
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

##### Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

run '~/.tmux/plugins/tpm/tpm'
